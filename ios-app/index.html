<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAMAZI — Download for iPhone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #052e16, #14532d, #15803d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      color: white;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
    .app-name {
      font-size: 2rem;
      font-weight: 700;
      color: #fbbf24;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: #4ade80;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }
    .message {
      color: #bbf7d0;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #fbbf24;
      color: #052e16;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 2rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #f59e0b; }
    .coming-soon {
      margin-top: 1.5rem;
      color: #4ade80;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .back { margin-top: 1.5rem; }
    .back a {
      color: #86efac;
      font-size: 0.85rem;
      text-decoration: none;
      opacity: 0.8;
    }
    .back a:hover { opacity: 1; }
  </style>
</head>

  <div class="card">
    <span class="emoji">🕌</span>

    <div class="platform-badge">

      </svg>

    </div>
    <p class="message">
      The NAMAZI app for iOS is coming soon to the Apple App Store.<br/><br/>
      Stay tuned — we'll notify your masjid when it's ready.

    <a href="#" class="btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">

      Download on the App Store

    <p class="coming-soon">⏳ Coming soon to the App Store</p>
    <div class="back"><a href="/">← Back to namazi-app.com</a></div>

</body>
</html>
