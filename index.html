<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: decode redirect from 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search.slice(1, 3) === 'p=') {
          var decoded = search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          var path = decoded[0].slice(2); // removes "p=" prefix; value already starts with "/"
          var query = decoded[1] ? ('?' + decoded[1].slice(2)) : '';
          window.history.replaceState(null, null, path + query + location.hash);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NAMAZI — The free app connecting masjids and Muslim communities. Prayer times, Qibla finder, masjid broadcasts and more." />
    <meta property="og:title" content="NAMAZI — Digital Bridge Between Masjid & Community" />
    <meta property="og:description" content="Download free on Android and iOS. Prayer times, Qibla, and real-time masjid announcements." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>NAMAZI — The Digital Masjid App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
